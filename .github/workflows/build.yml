name: Build Windows EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug estrutura
        run: |
          dir
          dir app
          dir build

      - name: Build EXE
        run: |
          pyinstaller build/comparador.spec --clean --noconfirm

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Comparador-Inteligente
          path: dist/
